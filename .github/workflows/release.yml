name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Validate versions match tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SERVER_VERSION="$(node -p "require('./packages/mcp-server/package.json').version")"
          OPENCLAW_VERSION="$(node -p "require('./packages/openclaw-plugin/package.json').version")"
          SERVER_JSON_VERSION="$(node -p "require('./packages/mcp-server/server.json').version")"

          echo "Tag version: $VERSION"
          echo "Server version: $SERVER_VERSION"
          echo "OpenClaw version: $OPENCLAW_VERSION"
          echo "server.json version: $SERVER_JSON_VERSION"

          if [[ "$SERVER_VERSION" != "$VERSION" ]]; then
            echo "packages/mcp-server/package.json version does not match tag."
            exit 1
          fi
          if [[ "$OPENCLAW_VERSION" != "$VERSION" ]]; then
            echo "packages/openclaw-plugin/package.json version does not match tag."
            exit 1
          fi
          if [[ "$SERVER_JSON_VERSION" != "$VERSION" ]]; then
            echo "packages/mcp-server/server.json version does not match tag."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build and typecheck
        run: |
          npm -w packages/mcp-server run build
          npm -w packages/openclaw-plugin run typecheck

      - name: Check already-published versions
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SERVER_EXISTS=false
          OPENCLAW_EXISTS=false

          if npm view "@newsmcp/server@$VERSION" version >/dev/null 2>&1; then
            SERVER_EXISTS=true
          fi
          if npm view "@newsmcp/openclaw@$VERSION" version >/dev/null 2>&1; then
            OPENCLAW_EXISTS=true
          fi

          echo "server_exists=$SERVER_EXISTS" >> "$GITHUB_OUTPUT"
          echo "openclaw_exists=$OPENCLAW_EXISTS" >> "$GITHUB_OUTPUT"
          echo "@newsmcp/server@$VERSION exists: $SERVER_EXISTS"
          echo "@newsmcp/openclaw@$VERSION exists: $OPENCLAW_EXISTS"

      - name: Publish @newsmcp/server to npm (Trusted Publishing)
        if: steps.version_check.outputs.server_exists != 'true'
        working-directory: packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ""
        shell: bash
        run: |
          set -euo pipefail
          output="$(npm publish --access public 2>&1)" || status=$?
          status="${status:-0}"
          echo "$output"
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if grep -qi "previously published versions" <<<"$output"; then
            echo "Version already published; continuing."
            exit 0
          fi
          exit "$status"

      - name: Publish @newsmcp/openclaw to npm (Trusted Publishing)
        if: steps.version_check.outputs.openclaw_exists != 'true'
        working-directory: packages/openclaw-plugin
        env:
          NODE_AUTH_TOKEN: ""
        shell: bash
        run: |
          set -euo pipefail
          output="$(npm publish --access public 2>&1)" || status=$?
          status="${status:-0}"
          echo "$output"
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if grep -qi "previously published versions" <<<"$output"; then
            echo "Version already published; continuing."
            exit 0
          fi
          exit "$status"

      - name: Install mcp-publisher
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OS="linux"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac
          ASSET_NAME="mcp-publisher_${OS}_${ARCH}.tar.gz"
          gh release download \
            --repo modelcontextprotocol/registry \
            --pattern "$ASSET_NAME" \
            --output /tmp/mcp-publisher.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher
          mkdir -p "$HOME/.local/bin"
          mv /tmp/mcp-publisher "$HOME/.local/bin/mcp-publisher"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Publish MCP metadata (GitHub OIDC)
        working-directory: packages/mcp-server
        shell: bash
        run: |
          set -euo pipefail
          mcp-publisher login github-oidc
          for attempt in $(seq 1 20); do
            if mcp-publisher publish server.json; then
              exit 0
            fi
            echo "MCP publish attempt $attempt failed (likely npm replication delay). Retrying in 30s..."
            sleep 30
          done
          echo "MCP publish failed after retries."
          exit 1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
